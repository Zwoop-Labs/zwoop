# fly.toml app configuration file generated for zwoop on 2026-06-16T07:25:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zwoop'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
